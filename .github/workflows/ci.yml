name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Tests
        run: python -m pytest
      - name: Smoke
        run: python -m quant_os.cli smoke
      - name: Live trading guard
        run: python -m quant_os.cli guard-live
      - name: Freqtrade dry-run config
        run: python -m quant_os.cli freqtrade generate-config
      - name: Freqtrade strategy export
        run: python -m quant_os.cli freqtrade export-strategy
      - name: Freqtrade safety validate
        run: python -m quant_os.cli freqtrade validate
      - name: Freqtrade dry-run check
        run: python -m quant_os.cli freqtrade dry-run-check
      - name: Freqtrade operational checks
        run: |
          python -m quant_os.cli freqtrade docker-check
          python -m quant_os.cli freqtrade ingest-logs
          python -m quant_os.cli freqtrade reconcile
          python -m quant_os.cli freqtrade dry-run-status
      - name: Dry-run comparison monitoring
        run: |
          python -m quant_os.cli dryrun history
          python -m quant_os.cli dryrun compare
          python -m quant_os.cli dryrun divergence-check
          python -m quant_os.cli dryrun monitor-report
          python -m quant_os.cli dryrun promote-check
