name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Tests
        run: python -m pytest
      - name: Smoke
        run: python -m quant_os.cli smoke
      - name: Live trading guard
        run: python -m quant_os.cli guard-live
