enabled: false
mode: dry_run
dry_run: true
live_trading_allowed: false
exchange: kraken
stake_currency: USDT
stake_amount: 10
max_open_trades: 1
trading_mode: spot
margin_mode: ""
allow_futures: false
allow_margin: false
allow_shorting: false
allow_leverage: false
timeframe: 5m
strategy_name: QuantOSDryRunStrategy
api_server_enabled: false
telegram_enabled: false
force_entry_enable: false
initial_state: stopped
pairs:
  - BTC/USDT
  - ETH/USDT
max_dry_run_stake_amount: 25
max_dry_run_open_trades: 1
docker:
  compose_file: docker-compose.yml
  service: freqtrade-dry-run
  profile: freqtrade-dry-run
  project_name: quant-os-freqtrade
  require_docker_check: true
  allow_container_start: false
  allow_container_stop: true
  start_timeout_seconds: 60
  logs_tail_lines: 300
operational:
  enabled: false
  explicit_start_required: true
  autonomous_start_allowed: false
  ingest_logs_enabled: true
  reconciliation_enabled: true
  report_enabled: true
artifacts:
  logs_dir: reports/freqtrade/logs
  status_dir: reports/freqtrade/status
  reconciliation_dir: reports/freqtrade/reconciliation
  manifests_dir: reports/freqtrade/manifests

